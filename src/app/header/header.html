<mat-toolbar class="main-header">
  <button matButton>
    <mat-icon aria-hidden="false" aria-label="Store" fontIcon="store"></mat-icon>
  </button>
  <span class="branding">Store</span>
  <span class="spacer"></span>
  <button matButton>
    Products
  </button>
  <button matButton>
    <mat-icon aria-hidden="false"
              aria-label="Cart"
              fontIcon="shopping_cart"
              [matBadge]="cartService.totalItems()"
              [matBadgeHidden]="cartService.totalItems() === 0"
              matBadgeDescription="Number of items in Cart"
              matBadgePosition="below"
    ></mat-icon>
  </button>
</mat-toolbar>
